# Coldplug (mdev's $MODALIAS rule and the hwdrivers service) loads drivers with
# `modprobe -b`, which applies these blacklist entries - so these modules do NOT autoload
# from their base-DTB nodes. Deliberate loads bypass -b and still work: the `modules`
# service (/etc/modules-load.d/ml.conf) loads without -b, ml-linkd insmods the RF driver
# directly, and kernel/modules/load.sh insmods the MPP stack by path.
#
# Applies on both flavors: coldplug runs on every image now (see scripts/make-rootfs.sh).

# RF link. Loaded explicitly with fw_name=/cfg_name= by the ml-video boot service (after it
# releases the AR8030 from reset). Keep it off the coldplug path so it never loads param-less
# when the SDIO function device appears.
blacklist artosyn_sdio

# SD/SDIO host clocks: dw_mci-artosyn loads param-less; its built-in defaults are the
# stock-faithful pair (SEL 0x80 = the 100 MHz tap, CFG phase 0, confirmed by register
# diff against a running slot-A system). The old bring-up override (clk_sel=135
# clk_cfg=2, values from misread slot-A dumps) is retired; if a host ever fails to
# enumerate, restore it here as `options dw_mci-artosyn clk_sel=135 clk_cfg=2`.

# wave5 dec_cap_bufs: leave at 0 (stock). Any cap below the stream's fbc_buf_count (9 for the
# RF tiles) starves the decoder of display buffers and the firmware spins on display-buffer-full:
# decode drops to ~25-40 fps with both cores pegged. The encoder's 1080p60 MMZ room comes from
# the page-granular coherent-pool kernel (patch 0011), not from capping the decoders.
