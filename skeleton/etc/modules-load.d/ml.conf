# Boot-time force-loads for the slim image, processed by the OpenRC `modules` service
# (which passes any trailing args on a line straight to modprobe). These are the modules
# that do NOT autoload from the devicetree via coldplug - either they have no DT node, or
# they need parameters. Everything that DOES have a DT node (display controller, buttons,
# buzzer/backlight, SoC temp, GPIO, SD, wave5 codec) is loaded by mdev/hwdrivers coldplug
# instead; see /etc/modprobe.d/ml.conf for what coldplug must NOT load.
#
# Consulted on both flavors: the `modules`/`mdev`/`hwdrivers` services are enabled for every
# image (see scripts/make-rootfs.sh), so the coldplug is the single module path.

# SDIO/SD host nodes: the boot DTS has no mmc nodes, so this overlay module creates them
# (mmc@1c00000 microSD + mmc@1b00000 AR8030 SDIO + gpio@a10a000). It runs before the
# coldplug sweep (the `modules` service is ordered `before hwdrivers`), so once the nodes
# exist hwdrivers loads dw_mci-artosyn (binds the SD card) and artosyn_gpio for them. The
# AR8030 stays in reset until RF bring-up, so its host sits idle. See the RF note in
# /etc/modprobe.d/ml.conf (artosyn_sdio).
ar_dtbo_sdio

# MIPI-DSI panel: the QY45043A0 (compatible qiyang,qy45043a0) is a DSI child, and DSI-bus
# modalias coldplug is less reliable than platform-device coldplug, so force-load its driver
# (no params). It registers and waits for the DSI host, then binds. The display controller
# and DSI glue themselves coldplug from their platform nodes (artosyn,vo / artosyn,dsi).
panel-qy45043a0

# DMA blit engine (char device /dev/ml-dmablit) exposing the built-in dw-axi-dmac copy engine to
# ml-pipeline for OFF-CPU two-tile compositing. No DT node (char shim), so force-load it here.
# REQUIRED for 60fps composite mode - without it ml-pipeline falls back to CPU blit (~40fps, eats a
# core). See gstreamer/README.md "Default operating mode" + memory composite-60fps-needs-dmablit.
ml_dmablit

# mmz dma-heap (/dev/dma_heap/mmz, ml-pipeline's default composite heap). Has a DT node
# (missinglynk,mmz-heap) so coldplug should also load it; force-loaded anyway because the
# fallback on a missing heap is a SILENT drop back to the small CMA heap - the exact
# exhaustion this module exists to fix.
ml_mmzheap
