# uMTP-Responder config for the MissingLynk MTP-over-USB recordings gadget.
# Read by umtprd (built in the wrapper's native/umtprd/, pinned umtprd-1.8.1),
# started from /etc/init.d/usb-gadget. Keys/syntax are uMTP-Responder's
# (conf/umtprd.conf sample + src/mtp_cfg.c parser).

# Reset the responder state and re-scan storages when the host disconnects, so a
# reconnect (e.g. after the SD card is swapped) shows a fresh view.
loop_on_disconnect 1

# --- Storage -------------------------------------------------------------------
# storage "PATH" "friendly name" "options"   (PATH is first)
#   The DVR writes recordings here and the Playback menu lists them (/mnt/sdcard,
#   mounted by ml-sdcard). "rw" is a locked requirement: the host must be able to
#   copy AND delete clips to free space on a full card.
#   /mnt/sdcard always exists as a mount point (empty dir when no card is present),
#   so this storage stays valid whether or not a card is inserted - the file list
#   simply appears/disappears with the card (graceful no-SD handling).
storage "/mnt/sdcard" "SD Card" "rw"

# --- USB / MTP identity --------------------------------------------------------
# The MTP interface is class 0x06 (Still Image) / subclass 0x01 / protocol 0x01
# (PTP) - this is how hosts recognise it as MTP. The device-level VID/PID/bcdDevice
# come from the configfs composite (etc/init.d/usb-gadget, 1d6b:0104); these are the
# values umtprd advertises for its own function.
usb_vendor_id       0x1D6B
usb_product_id      0x0104
usb_class           0x06
usb_subclass        0x01
usb_protocol        0x01
usb_dev_version     0x0100
usb_max_packet_size 0x200

manufacturer     "missinglynk"
product          "@USB_PRODUCT@"
serial           "0001"
firmware_version "open"
interface        "MTP"
mtp_extensions   "microsoft.com: 1.0; android.com: 1.0;"

# --- FunctionFS endpoint paths -------------------------------------------------
# usb-gadget mounts the gadget's ffs.mtp instance at /dev/ffs-mtp BEFORE starting
# umtprd, and binds the UDC only after umtprd has written the descriptors to ep0.
usb_functionfs_mode 0x1
usb_dev_path   "/dev/ffs-mtp/ep0"
usb_epin_path  "/dev/ffs-mtp/ep1"
usb_epout_path "/dev/ffs-mtp/ep2"
usb_epint_path "/dev/ffs-mtp/ep3"
