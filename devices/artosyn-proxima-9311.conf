# Device profile: Artosyn Proxima-9311 goggle (BetaFPV VR04 HD / ArtLynk). The default.
# Sourced by build.sh; override with `build.sh path/to/profile.conf`. All vars required.

# Target identity / addressing
HOSTNAME="artosyn-libre"
ROOT_PASS="libre"
GADGET_IP="192.168.3.100"        # device side of the USB ECM link
GADGET_CIDR="24"
HOST_GW="192.168.3.222"          # host side; does NAT for the device
DEV_MAC="DE:AD:BE:EF:CA:FE"      # fixed MACs -> stable host ifname across reboots
HOST_MAC="DE:AD:BE:EF:F0:0D"

# UBI / NAND geometry
PARTITION="userapp1"             # MTD partition to flash / boot
PARTITION_PEBS=360               # partition size in PEBs (45 MiB at 128 KiB/PEB)
PEB_SIZE=131072                  # physical erase block
MIN_IO=2048                      # min I/O / NAND page
SUBPAGE=2048
LEB_SIZE=126976                  # UBIFS logical erase block
MAX_LEB_COUNT=350                # UBIFS max volume size in LEBs
