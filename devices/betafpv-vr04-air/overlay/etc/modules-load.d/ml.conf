# Boot-time module force-loads for the air unit (P1_SKY), processed by the OpenRC `modules`
# service. Everything with a DT node coldplugs from mdev/hwdrivers (RF SDIO, SD, wave5 codec);
# this file force-loads the ones without a DT node or whose coldplug fallback is unsafe.
#
# vs the goggle: NO panel (no display), NO ml_dmablit (RX compositor), NO ar_scaler yet. The
# camera capture modules (artosyn MIPI-CSI / VIF / ISP + the NT99235 sensor) are greenfield and
# get added here once they exist (plans/air-unit-open-stack.md).

# mmz dma-heap (/dev/dma_heap/mmz): the wave5 encoder's pool. Has a DT node
# (missinglynk,mmz-heap) so coldplug should load it, but force-load anyway - the fallback on a
# missing heap is a SILENT drop to the small CMA heap, the exact exhaustion this exists to fix.
ml_mmzheap
