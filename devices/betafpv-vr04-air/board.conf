# Device profile: Artosyn Proxima-9311 air unit (BetaFPV VR04 HD / ArtLynk, P1_SKY).
# Sourced by build.sh (`build.sh betafpv-vr04-air`). All vars required. The AU's MTD/UBI layout
# is identical to the goggle's (confirmed on-device), so the geometry below matches.

# Target identity / addressing. Shared-subnet scheme (see the goggle profile), device index
# NN=2 (NN=0/192.168.3.100 is reserved for stock/unflashed units): unique fixed MACs + unique IP
# on the common 192.168.3.0/24 segment, so goggle and AU can be plugged into the same host at the
# same time via the br-artosyn bridge. HAS_SD gates the SD-dependent bits (MTP gadget function, DVR).
HOSTNAME="art-sirius-libre"
ROOT_PASS="libre"
USB_PRODUCT="BetaFPV VR04 HD Air Unit"
HW_VERSION="V1.0"                # hardware version reported in the air unit's telemetry status frame
GADGET_IP="192.168.3.102"        # device side of the USB ECM link: 192.168.3.(100+NN)
GADGET_CIDR="24"
HOST_GW="192.168.3.222"          # host side (bridge address); does NAT for the device
DEV_MAC="EE:EE:00:00:00:02"      # device-internal MAC: EE:EE:<NN as 4 bytes>
HOST_MAC="AA:AA:00:00:00:02"     # host-visible MAC:    AA:AA:<NN as 4 bytes>
HAS_SD="0"                       # this AU variant has no microSD slot (no MTP, no DVR)
RF_ROLE="air"                    # RF link role: selects which AR8030 baseband firmware is baked
                                 # (air = bb_demo_air_d.img + bb_config_air.json, the TX side)

# UBI / NAND geometry (identical to the goggle: same SoC, same partition table).
PARTITION="userapp1"             # MTD partition to flash / boot (slot B)
PARTITION_PEBS=360               # partition size in PEBs (45 MiB at 128 KiB/PEB)
PEB_SIZE=131072                  # physical erase block
MIN_IO=2048                      # min I/O / NAND page
SUBPAGE=2048
LEB_SIZE=126976                  # UBIFS logical erase block
MAX_LEB_COUNT=350                # UBIFS max volume size in LEBs
