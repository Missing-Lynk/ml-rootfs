# Device profile: Artosyn Proxima-9311 air unit (BetaFPV VR04 HD / ArtLynk, P1_SKY).
# Sourced by build.sh (`build.sh betafpv-vr04-air`). All vars required. The AU's MTD/UBI layout
# is identical to the goggle's (confirmed on-device), so the geometry below matches.

# Target identity / addressing. Distinct subnet + MACs from the goggle so both can be on USB at
# once. On the bench the AU is usually reached over the RF relay (10.0.0.100) instead; this is
# its own USB-ECM gadget for direct access.
HOSTNAME="art-sirius-libre"
ROOT_PASS="libre"
USB_PRODUCT="BetaFPV VR04 HD Air Unit"
GADGET_IP="192.168.4.100"        # device side of the USB ECM link
GADGET_CIDR="24"
HOST_GW="192.168.4.222"          # host side; does NAT for the device
DEV_MAC="DE:AD:BE:EF:CA:FA"      # fixed MACs -> stable host ifname across reboots
HOST_MAC="DE:AD:BE:EF:F0:0A"

# UBI / NAND geometry (identical to the goggle: same SoC, same partition table).
PARTITION="userapp1"             # MTD partition to flash / boot (slot B)
PARTITION_PEBS=360               # partition size in PEBs (45 MiB at 128 KiB/PEB)
PEB_SIZE=131072                  # physical erase block
MIN_IO=2048                      # min I/O / NAND page
SUBPAGE=2048
LEB_SIZE=126976                  # UBIFS logical erase block
MAX_LEB_COUNT=350                # UBIFS max volume size in LEBs
