# Device profile: Artosyn Proxima-9311 goggle (BetaFPV VR04 HD / ArtLynk). The default.
# Sourced by build.sh; override with `build.sh path/to/profile.conf`. All vars required.

# Target identity / addressing
HOSTNAME="artosyn-libre"
ROOT_PASS="libre"
# USB product string: what a host shows for the gadget (USB device descriptor + MTP device
# name). Per-board so each device names itself; used nominatively to identify the hardware.
USB_PRODUCT="BetaFPV VR04 HD Goggle"
# Addressing scheme, shared subnet, per-device index NN (this device: 1). Index NN=0 (192.168.3.100,
# MAC ...:00) is reserved for any stock/unflashed unit, so real open-slot devices start at NN=1. The
# fixed MACs give a stable host ifname (enx<HOST_MAC>) encoding NN, and every device joins the host's
# br-artosyn bridge (glue/net/net-up.sh), so devices coexist on one L2 segment with distinct IPs.
GADGET_IP="192.168.3.101"        # device side of the USB ECM link: 192.168.3.(100+NN)
GADGET_CIDR="24"
HOST_GW="192.168.3.222"          # host side (bridge address); does NAT for the device
DEV_MAC="EE:EE:00:00:00:01"      # device-internal MAC: EE:EE:<NN as 4 bytes>
HOST_MAC="AA:AA:00:00:00:01"     # host-visible MAC:    AA:AA:<NN as 4 bytes>
HAS_SD="1"                       # goggle records the composite feed to microSD (MTP + DVR)
RF_ROLE="ground"                 # RF link role: selects which AR8030 baseband firmware is baked
                                 # (ground = bb_demo_gnd_d.img, the goggle/RX side)

# UBI / NAND geometry
PARTITION="userapp1"             # MTD partition to flash / boot
PARTITION_PEBS=360               # partition size in PEBs (45 MiB at 128 KiB/PEB)
PEB_SIZE=131072                  # physical erase block
MIN_IO=2048                      # min I/O / NAND page
SUBPAGE=2048
LEB_SIZE=126976                  # UBIFS logical erase block
MAX_LEB_COUNT=350                # UBIFS max volume size in LEBs
